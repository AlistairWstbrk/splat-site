<div class="streamlit-sidebar">
    <h2 style="margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #4B4C53; padding-bottom: 10px;">EV Training Explorer</h2>
    
    <div class="sidebar-section">
        <label for="categorySelect">1. Filter by Type</label>
        <select id="categorySelect" class="st-input">
            <option value="" disabled selected>Loading...</option>
        </select>

        <label for="modelSelect">2. Select Scan</label>
        <select id="modelSelect" class="st-input" onchange="changeModel(this.value)">
            <option value="" disabled selected>-- Select a Type first --</option>
        </select>

        <a id="downloadBtn" href="#" target="_blank" class="st-button st-button-secondary" style="display:none; text-decoration: none; text-align: center;">
            ⬇️ Download .ply File
        </a>
        <p style="margin-top: 8px; font-size: 11px; color: #ffbd45; line-height: 1.3;">
            ⚠️ <b>Note:</b> Large files (~200MB). Allow 15-30s.
        </p>
    </div>

    <hr style="border-top: 1px solid #4B4C53; border-bottom: none; margin: 20px 0;">

    <div class="sidebar-section">
        <h3 style="margin-top: 0; font-size: 1.1rem;">📷 Camera Tool</h3>
        <p style="font-size: 12px; color: #b2bcec; line-height: 1.3; margin-bottom: 10px;">
            Position the camera in the viewer, capture the matrix, and copy it for your training modules.
        </p>
        
        <button id="captureCamBtn" class="st-button st-button-primary">Capture Current View</button>
        
        <label for="camOutput" style="margin-top: 15px;">Matrix Output (JSON)</label>
        <textarea id="camOutput" rows="3" class="st-input" style="font-family: monospace; font-size: 11px; resize: vertical;" readonly placeholder="Matrix will appear here..."></textarea>
        
        <button id="copyCamBtn" class="st-button st-button-secondary" style="margin-top: 5px;">📋 Copy to Clipboard</button>
    </div>
</div>

<style>
    /* Global font override to match Streamlit's clean look */
    body { font-family: "Source Sans Pro", sans-serif; }

    .streamlit-sidebar {
        position: absolute;
        top: 0; left: 0; bottom: 0;
        width: 300px;
        background-color: #262730; /* Streamlit dark theme sidebar */
        color: #FAFAFA;
        padding: 2rem 1.5rem;
        z-index: 1000;
        overflow-y: auto;
        box-shadow: 2px 0 10px rgba(0,0,0,0.5);
    }

    .sidebar-section label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 14px;
        color: #FAFAFA;
    }

    .st-input {
        width: 100%;
        padding: 0.5rem;
        margin-bottom: 15px;
        background-color: #0E1117; /* Darker input background */
        color: white;
        border: 1px solid rgba(250, 250, 250, 0.2);
        border-radius: 0.25rem;
        box-sizing: border-box;
    }
    .st-input:focus {
        outline: none;
        border-color: #FF4B4B;
    }

    .st-button {
        display: block;
        width: 100%;
        padding: 0.5rem;
        border-radius: 0.25rem;
        border: 1px solid transparent;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.2s ease;
    }

    /* Primary button mimics Streamlit's red accent */
    .st-button-primary {
        background-color: #FF4B4B;
        color: white;
    }
    .st-button-primary:hover {
        background-color: #FF6666;
    }

    /* Secondary button mimics Streamlit's outline buttons */
    .st-button-secondary {
        background-color: #2b2c36;
        color: #FAFAFA;
        border-color: rgba(250, 250, 250, 0.2);
    }
    .st-button-secondary:hover {
        border-color: #FF4B4B;
        color: #FF4B4B;
    }
</style>

<script>
    // --- Existing Model Loading Logic ---
    let allModels = [];
    const categorySelect = document.getElementById('categorySelect');
    const modelSelect = document.getElementById('modelSelect');
    const downloadBtn = document.getElementById('downloadBtn');

    fetch('models.json')
        .then(response => {
            if (!response.ok) throw new Error("Could not find models.json");
            return response.json();
        })
        .then(data => {
            allModels = data;
            initializeMenu();
        })
        .catch(error => {
            console.error('Error loading models:', error);
            categorySelect.innerHTML = '<option disabled>Error loading data</option>';
        });

    function initializeMenu() {
        const categories = [...new Set(allModels.map(item => item.category || "Uncategorized"))];
        categorySelect.innerHTML = '<option value="" disabled selected>-- Select Type --</option>';
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            categorySelect.appendChild(option);
        });

        categorySelect.addEventListener('change', (e) => {
            updateModelDropdown(e.target.value);
        });
        checkPersistence();
    }

    function updateModelDropdown(selectedCategory) {
        const filteredModels = allModels.filter(m => (m.category || "Uncategorized") === selectedCategory);
        modelSelect.innerHTML = '<option value="" disabled selected>-- Choose a Model --</option>';
        filteredModels.forEach(model => {
            const option = document.createElement('option');
            option.value = model.url;
            option.textContent = model.name;
            modelSelect.appendChild(option);
        });
    }

    function changeModel(url) {
        window.location.search = '?url=' + url;
    }

    function checkPersistence() {
        const currentParams = new URLSearchParams(window.location.search);
        const rawUrl = currentParams.get('url');
        if (rawUrl) {
            const currentUrlDecoded = decodeURIComponent(rawUrl).trim();
            const matchedModel = allModels.find(m => decodeURIComponent(m.url).trim() === currentUrlDecoded);
            if (matchedModel) {
                const cat = matchedModel.category || "Uncategorized";
                categorySelect.value = cat;
                updateModelDropdown(cat);
                modelSelect.value = matchedModel.url;
                downloadBtn.href = matchedModel.url;
                downloadBtn.style.display = "block"; 
            }
        }
    }

    // --- NEW: Camera Angle Manager Logic ---
    const captureCamBtn = document.getElementById('captureCamBtn');
    const copyCamBtn = document.getElementById('copyCamBtn');
    const camOutput = document.getElementById('camOutput');

    captureCamBtn.addEventListener('click', () => {
        // Accesses the global viewMatrix from main.js
        if (typeof viewMatrix !== 'undefined') {
            // Rounds everything to 2 decimal places exactly like the 'v' key logic
            const roundedMatrix = viewMatrix.map((k) => Math.round(k * 100) / 100);
            camOutput.value = JSON.stringify(roundedMatrix);
        } else {
            camOutput.value = "Error: Viewer not loaded.";
        }
    });

    copyCamBtn.addEventListener('click', () => {
        if(camOutput.value && camOutput.value !== "Error: Viewer not loaded.") {
            navigator.clipboard.writeText(camOutput.value).then(() => {
                const originalText = copyCamBtn.innerText;
                copyCamBtn.innerText = "✅ Copied!";
                copyCamBtn.style.borderColor = "#4CAF50";
                copyCamBtn.style.color = "#4CAF50";
                
                setTimeout(() => {
                    copyCamBtn.innerText = originalText;
                    copyCamBtn.style.borderColor = "rgba(250, 250, 250, 0.2)";
                    copyCamBtn.style.color = "#FAFAFA";
                }, 2000);
            });
        }
    });
</script>
